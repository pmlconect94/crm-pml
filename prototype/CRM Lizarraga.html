                ¿No tienes cuenta?{" "}

                marginBottom: 10, boxShadow: "0 1px 2px rgba(0,0,0,0.05)",

                overflow: "hidden"
              }}
              onMouseEnter={isSoon ? undefined : (e) => {e.currentTarget.style.transform = "translateY(-2px)";e.currentTarget.style.boxShadow = "var(--shadow-lg)";e.currentTarget.style.borderColor = "var(--blue-500)";}}
              onMouseLeave={isSoon ? undefined : (e) => {e.currentTarget.style.transform = "translateY(0)";e.currentTarget.style.boxShadow = "var(--shadow-sm)";e.currentTarget.style.borderColor = "var(--ink-200)";}}>
              
                {isSoon &&
              <div style={{ position: "absolute", top: 14, right: -32, transform: "rotate(35deg)", background: "var(--ink-900, #0A2540)", color: "white", padding: "3px 40px", fontSize: 10, fontWeight: 800, letterSpacing: "0.12em" }}>
                    PRÓXIMAMENTE
                  </div>
              }
                <div className="hstack" style={{ justifyContent: "space-between", marginBottom: 20 }}>
                  <CompanyCrest company={c} size={64} />
                  <div className="vstack" style={{ gap: 4, alignItems: "flex-end" }}>
                    {!isSoon && <span className={`badge ${c.id === "pml" ? "badge-blue" : "badge-violet"}`}>{c.tipo}</span>}
                    {!isSoon && <span className="text-xs muted">{depts} depto{depts !== 1 ? "s" : ""} habilitado{depts !== 1 ? "s" : ""}</span>}
                    {isSoon && <span className="badge badge-gray">No disponible</span>}
                  </div>
                </div>
                <h2 style={{ fontSize: 20, fontWeight: 700, margin: 0, letterSpacing: "-0.01em" }}>{c.name}</h2>
                <p className="muted" style={{ fontSize: 13, marginTop: 4, marginBottom: 20 }}>{c.tagline}</p>

                <div className="hstack" style={{ justifyContent: "flex-end", marginTop: 24, paddingTop: 16, borderTop: "1px solid var(--ink-100)", color: isSoon ? "var(--ink-400)" : "var(--blue-500)", fontWeight: 600, fontSize: 13 }}>
                  {isSoon ? "En construcción" : <>Entrar <Icon name="arrowRight" size={14} /></>}
                </div>
              </button>);

        })}
        </div>

        <div style={{ textAlign: "center", marginTop: 32, fontSize: 12, color: "var(--ink-500)" }}>
          ¿Necesitas acceso a otra empresa? <a href="#" style={{ color: "var(--blue-500)", fontWeight: 600, textDecoration: "none" }}>Solicitar permisos</a>
        </div>
      </div>
    </div>
  </div>;


// ============== APP SHELL (with dept content) ==============
const AppShell = ({ company, user, onSwitchCompany, onLogout, bulkVariation }) => {
  const [activeDept, setActiveDept] = useState("logistica");
  const [activeSupplier, setActiveSupplier] = useState("blufin");
  const allowed = user.roles[company.id] || [];
  const activeDeptMeta = DEPTS.find((d) => d.id === activeDept);

  // sync bulk variation to window for blufin-bulk to read
  useEffect(() => {
    window.__blufinBulkVariation = bulkVariation;
  }, [bulkVariation]);

  // reset supplier if not in logistica
  useEffect(() => {
    if (activeDept !== "logistica") setActiveSupplier(null);
  }, [activeDept]);

  // reset if not allowed
  useEffect(() => {
    if (activeDept !== "dashboard" && !allowed.includes(activeDept)) {
      setActiveDept("dashboard");
    }
  }, [allowed.join(",")]);

  let content;
  if (activeDept === "logistica" && activeSupplier === "blufin")      content = <BlufinModule key={bulkVariation} />;else
  if (activeDept === "logistica" && activeSupplier === "camanchaca")  content = <CamanchacaModule />;else
  if (activeDept === "logistica" && activeSupplier === "neptuno")     content = <NeptunoModule />;else
  if (activeDept === "dashboard") content = <DashboardGeneral company={company} />;else
  if (activeDept === "logistica") content = <DashboardLogistica company={company} onSelectSupplier={(s) => { setActiveDept("logistica"); setActiveSupplier(s); }} />;else
  if (activeDept === "administracion") content = <DashboardAdmin company={company} />;else
  if (activeDept === "rh") content = <DashboardRH company={company} />;else
  content = <DashboardPlaceholder company={company} dept={activeDept} label={activeDeptMeta?.label} icon={activeDeptMeta?.icon} />;

  const topbarLabel = activeSupplier === "blufin"      ? "Importaciones › Blufin Seafood"
    : activeSupplier === "camanchaca" ? "Importaciones › Camanchaca"
    : activeSupplier === "neptuno"    ? "Importaciones › Neptuno Seafood"
    : (activeDeptMeta?.label || "Dashboard");

  return (
    <div className="app-shell" data-screen-label={`App — ${company.short} — ${topbarLabel}`}>
      <Sidebar
        company={company}
        activeDept={activeDept}
        setActiveDept={(d) => { setActiveDept(d); if (d !== "logistica") setActiveSupplier(null); }}
        activeSupplier={activeSupplier}
        setActiveSupplier={(s) => { setActiveDept("logistica"); setActiveSupplier(s); }}
        onSwitchCompany={onSwitchCompany}
        onLogout={onLogout}
        allowedDepts={allowed} />
      
      <div className="main-area">
        <Topbar user={user} company={company} activeDeptLabel={topbarLabel} onOpenSwitcher={onSwitchCompany} />
        <div className="content">{content}</div>
      </div>
    </div>);

};

// ============== ROOT APP ==============
const App = () => {
  const [screen, setScreen] = useState("app"); // login | switcher | app
  const [companyId, setCompanyId] = useState("pml");

  const [tweaks, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "role": "admin_total",
    "company": "pml",
    "screen": "almacen",
    "bulkVariation": "table"
  }/*EDITMODE-END*/);

  // Build user from tweaks
  const roleName = ROLE_NAMES[tweaks.role] || "Carlos Lizárraga";
  const user = {
    name: roleName,
    email: roleName.toLowerCase().replace(/\s+/g, ".").replace(/[áéíóú]/g, "") + "@lizarraga.mx",
    initials: roleName.split(" ").map((n) => n[0]).join("").slice(0, 2),
    roles: {
      pml: ROLE_PERMS[tweaks.role]?.depts || [],
      marlin: ROLE_PERMS[tweaks.role]?.depts || []
    }
  };

  // sync company tweak -> current
  useEffect(() => {
    if (tweaks.company && tweaks.company !== companyId) setCompanyId(tweaks.company);
  }, [tweaks.company]);

  const company = CRM_DATA.companies.find((c) => c.id === companyId);

  return (
    <>
      {screen === "login" && <LoginScreen onLogin={() => setScreen("switcher")} />}
      {screen === "switcher" && <CompanySwitcher user={user} onSelect={(id) => {setCompanyId(id);setTweak("company", id);setScreen("app");}} onLogout={() => setScreen("login")} />}
      {screen === "app" &&
      <AppShell
        company={company}
        user={user}
        bulkVariation={tweaks.bulkVariation}
        onSwitchCompany={() => setScreen("switcher")}
        onLogout={() => setScreen("login")} />

      }

      <TweaksPanel title="Tweaks">
        <TweakSection label="Rol simulado" />
        <TweakRadio
          label="Rol"
          value={tweaks.role}
          onChange={(v) => setTweak("role", v)}
          options={Object.entries(ROLE_PERMS).map(([id, r]) => ({ value: id, label: r.label }))} />
        
        <TweakSection label="Empresa activa" />
        <TweakRadio
          label="Empresa"
          value={tweaks.company}
          onChange={(v) => {setTweak("company", v);setCompanyId(v);}}
          options={CRM_DATA.companies.map((c) => ({ value: c.id, label: c.short }))} />
        
        <TweakSection label="Pantalla" />
        <TweakRadio
          label="Vista"
          value={screen}
          onChange={(v) => setScreen(v)}
          options={[
          { value: "login", label: "Login" },
          { value: "switcher", label: "Empresas" },
          { value: "app", label: "App" }]
          } />
        
        <TweakSection label="Blufin — Variación carga masiva" />
        <TweakRadio
          label="Layout"
          value={tweaks.bulkVariation}
          onChange={(v) => setTweak("bulkVariation", v)}
          options={[
          { value: "table", label: "Tabla" },
          { value: "wizard", label: "Wizard" },
          { value: "split", label: "Split PDF" }]
          } />
      </TweaksPanel>
    </>);

};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
